name = "edgeiq-autopilot"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

# Cloudflare credentials (set via wrangler secret or environment)
# CLOUDFLARE_API_TOKEN should be set via `wrangler secret put CLOUDFLARE_API_TOKEN`
# CLOUDFLARE_ACCOUNT_ID should be set via `wrangler secret put CLOUDFLARE_ACCOUNT_ID`

# Stripe configuration
# STRIPE_SECRET_KEY should be set via `wrangler secret put STRIPE_SECRET_KEY`

# GitHub configuration
# GITHUB_TOKEN for EdgeIQ's own internal operations (customer tokens stored per-customer in KV)

# KV namespaces
[[kv_namespaces]]
binding = "CUSTOMER_CONFIG"
id = "YOUR_KV_NAMESPACE_ID"  # Replace with actual KV namespace ID after running `wrangler kv:namespace create CUSTOMER_CONFIG`

[[kv_namespaces]]
binding = "AUTOPILOT_STATE"
id = "YOUR_KV_NAMESPACE_ID_2"  # Replace with second KV namespace ID

# Sites to be monitored for SSL (EdgeIQ's own domains first)
[[vars.ssl_monitored_domains]]
domain = "edgeiq.io"
cf_zone_id = "YOUR_ZONE_ID"

[[vars.ssl_monitored_domains]]
domain = "tools.edgeiq.io"
cf_zone_id = "YOUR_ZONE_ID"